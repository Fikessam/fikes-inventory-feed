name: Crawl Inventory & Deploy Feed
on:
  schedule:
    # Run every day at 6 AM and 6 PM Central (11:00 and 23:00 UTC)
    - cron: "0 11,23 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI
permissions:
  contents: write
jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64 \
            libpango-1.0-0 libcairo2 libgtk-3-0
      - name: Install Node dependencies
        run: npm ci
      - name: Diagnostic - plain HTTP check of sitemap URL from this runner
        # Deliberately runs BEFORE the Puppeteer-based crawler. No browser
        # involved at all here — just a raw HTTP request from this exact
        # runner's IP, to isolate whether a 403 on the sitemap URL is about
        # this runner's network origin/IP reputation, or specifically about
        # Puppeteer/headless-Chrome's fingerprint. This step never fails the
        # job (curl's exit code is ignored) — it's purely informational, so
        # its result is visible in this step's own log for the next run.
        run: |
          echo "Plain curl HTTP status for homepage:"
          curl -s -o /dev/null -w "%{http_code}\n" https://www.fikeschevy.com/ || true
          echo "Plain curl HTTP status for sitemap URL:"
          curl -s -o /dev/null -w "%{http_code}\n" https://www.fikeschevy.com/dealer-inspire-inventory/inventory_sitemap || true
          echo "First 500 bytes of sitemap response body:"
          curl -s https://www.fikeschevy.com/dealer-inspire-inventory/inventory_sitemap | head -c 500 || true
          echo ""
        continue-on-error: true
      - name: Run crawler
        run: node scraper.js
      - name: Commit & push feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml docs/inventory.json
          git diff --staged --quiet || git commit -m "chore: update inventory feed [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
